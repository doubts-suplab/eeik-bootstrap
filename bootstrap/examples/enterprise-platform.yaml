# EEIK Project Manifest — Example: Enterprise Platform (Multi-team / Regulated)
# Generated by: /bootstrap
# Schema: bootstrap/schemas/manifest-schema.json
#
# Use case: Shared banking risk intelligence platform serving multiple product teams
# Suitable for: Large enterprise programme with formal ARB governance and regulatory obligations
# Governance: Enterprise (banking domain — PCI-DSS, GDPR, Basel III)

schema_version: "1.0"

project:
  name: risk-intelligence-platform
  description: Shared real-time risk intelligence platform for credit, fraud, and market risk
  owner: risk-platform-tribe
  domain: banking
  project_type: enterprise-platform

technology:
  backend:
    language: java
    version: 21
    framework: spring-boot
  frontend:
    framework: react
  database:
    type: aurora-postgresql
    migration_tool: flyway
    orm: spring-data-jpa
  messaging:
    broker: kafka
    pattern: event-driven

architecture:
  style: event-driven
  patterns:
    - ddd
    - cqrs
    - saga
    - outbox
    - api-gateway
  api_style: rest

cloud:
  provider: aws
  infra_as_code: cdk
  regions:
    - eu-west-1
    - eu-central-1
  multi_account: true

ai:
  enabled: true
  pattern: multi-agent
  framework: langgraph
  foundation_model: claude
  governance_required: true         # Required: regulated domain + multi-agent
  memory_pattern: persistent-db

governance:
  profile: enterprise               # Required: banking domain
  reviews_required:
    - architecture-review
    - security-review
    - arb-gate
    - production-readiness-review
    - compliance-review
    - ai-governance-review
  compliance_frameworks:
    - gdpr
    - pci-dss

delivery:
  model: enterprise-program
  methodology: scaled-agile
  sprint_length_weeks: 2
  cicd_platform: github-actions

observability:
  enabled: true
  logging: cloudwatch
  tracing: x-ray
  metrics: cloudwatch
  slo_required: true                # Required: enterprise governance

# ── Resolved Capability Packs ─────────────────────────────────
# architecture-pack     ✅ built
# java-pack             ✅ built
# aws-pack              ✅ built
# ai-engineering-pack   ✅ built
# governance-pack       ✅ built
# banking-pack          📋 planned (Phase 7)

# ── Recommended Agents ────────────────────────────────────────
# enterprise-architect, architect, java-tech-lead, aws-architect,
# ai-governance-officer, security-auditor, arb-reviewer,
# performance-engineer, langraph-engineer, sre-engineer

# ── Required Reviews Before Production ───────────────────────
# 1. Architecture Review (architect + enterprise-architect)
# 2. ARB Gate (/adr for each major decision)
# 3. Security Review (/security-scan)
# 4. AI Governance Review (ai-governance-officer)
# 5. Production Readiness Review (/deploy-check)
# 6. Compliance Review (mapping to GDPR + PCI-DSS)
