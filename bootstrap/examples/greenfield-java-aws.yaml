# EEIK Project Manifest — Example: Greenfield Java / AWS / Microservices
# Generated by: /bootstrap
# Schema: bootstrap/schemas/manifest-schema.json
#
# Use case: New microservices platform built on Java 21, Spring Boot 3, AWS CDK
# Suitable for: A new internal product or customer-facing API platform
# Governance: Standard (no regulated domain)

schema_version: "1.0"

project:
  name: payment-gateway
  description: API gateway handling payment initiation, routing, and settlement
  owner: payments-engineering
  domain: generic
  project_type: greenfield

technology:
  backend:
    language: java
    version: 21
    framework: spring-boot
  frontend:
    framework: none
  database:
    type: aurora-postgresql
    migration_tool: flyway
    orm: spring-data-jpa
  messaging:
    broker: sqs
    pattern: event-driven

architecture:
  style: microservices
  patterns:
    - ddd
    - outbox
    - api-gateway
  api_style: rest

cloud:
  provider: aws
  infra_as_code: cdk
  regions:
    - eu-west-1
  multi_account: true

ai:
  enabled: false

governance:
  profile: standard
  reviews_required:
    - architecture-review
    - security-review

delivery:
  model: multi-team
  methodology: agile
  sprint_length_weeks: 2
  cicd_platform: github-actions

observability:
  enabled: true
  logging: cloudwatch
  tracing: x-ray
  metrics: cloudwatch
  slo_required: false

# ── Resolved Capability Packs ─────────────────────────────────
# architecture-pack   ✅ built
# java-pack           ✅ built
# aws-pack            ✅ built
# governance-pack     ✅ built

# ── Recommended Agents ────────────────────────────────────────
# architect, java-developer, java-tech-lead, aws-architect,
# code-reviewer, security-auditor, java-tester
