# EEIK Project Manifest — Example: AI Agent PoC (LangGraph / Bedrock / AWS)
# Generated by: /bootstrap
# Schema: bootstrap/schemas/manifest-schema.json
#
# Use case: Time-boxed exploration of a multi-agent AI assistant for internal knowledge retrieval
# Suitable for: 4–8 week PoC with small team, no production governance required
# Governance: Basic (PoC — not a regulated domain)

schema_version: "1.0"

project:
  name: knowledge-agent-poc
  description: Multi-agent AI assistant for internal knowledge retrieval using RAG and LangGraph
  owner: ai-innovation-lab
  domain: generic
  project_type: poc

technology:
  backend:
    language: python
    version: 3.12
    framework: fastapi
  frontend:
    framework: react
  database:
    type: dynamodb
    migration_tool: none

architecture:
  style: agentic
  patterns:
    - api-gateway
  api_style: rest

cloud:
  provider: aws
  infra_as_code: cdk
  regions:
    - eu-west-1
  multi_account: false

ai:
  enabled: true
  pattern: multi-agent
  framework: langgraph
  foundation_model: claude
  governance_required: false        # PoC only — enable for production
  memory_pattern: vector-store

governance:
  profile: basic                    # Basic for PoC — upgrade to standard for production
  reviews_required: []

delivery:
  model: single-team
  methodology: kanban
  sprint_length_weeks: 1
  cicd_platform: github-actions

observability:
  enabled: true
  logging: cloudwatch
  tracing: x-ray
  metrics: cloudwatch
  slo_required: false

# ── Resolved Capability Packs ─────────────────────────────────
# architecture-pack     ✅ built
# ai-engineering-pack   ✅ built
# aws-pack              ✅ built
# governance-pack       ✅ built

# ── Recommended Agents ────────────────────────────────────────
# ai-engineer, langraph-engineer, architect, aws-architect,
# mcp-engineer, data-scientist

# ── PoC → Production Upgrade Path ────────────────────────────
# When moving to production:
#   - set project_type: mvp or greenfield
#   - set governance.profile: standard (or regulated if domain changes)
#   - set ai.governance_required: true
#   - add observability.slo_required: true
#   - run /validate-manifest to verify
