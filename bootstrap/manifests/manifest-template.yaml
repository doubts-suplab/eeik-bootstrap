# ─────────────────────────────────────────────────────────────
# EEIK Project Manifest Template
# Generated by: /bootstrap  |  Validated by: /validate-manifest
# Schema: bootstrap/schemas/manifest-schema.json
# Version: 1.0
#
# Instructions:
#   1. Replace all <PLACEHOLDER> values
#   2. Remove optional sections you don't need
#   3. Run /validate-manifest to check for errors
#   4. This file is the source of truth for all EEIK tooling
# ─────────────────────────────────────────────────────────────

schema_version: "1.0"

# ── Project Identity (required) ───────────────────────────────
project:
  name: <project-name>            # kebab-case, e.g. claims-modernization
  description: <one-sentence>     # What does this project do?
  owner: <team-name>              # Owning squad or team
  domain: <domain>                # insurance | banking | healthcare | retail | generic
  project_type: <type>            # greenfield | modernization | poc | mvp | enterprise-platform | agent-platform

# ── Technology Stack (required: backend) ──────────────────────
technology:
  backend:
    language: <language>          # java | python | mixed
    version: <version>            # e.g. 21 (Java 21), 3.12 (Python 3.12)
    framework: <framework>        # spring-boot | quarkus | fastapi | django

  # Remove if no frontend
  frontend:
    framework: <frontend>         # react | angular | none

  # Remove if no database
  database:
    type: <db-type>               # postgresql | aurora-postgresql | dynamodb | db2 | oracle | mixed
    migration_tool: flyway        # flyway | liquibase | none
    orm: <orm>                    # spring-data-jpa | spring-data-jdbc | jdbctemplate | sqlalchemy | none

  # Remove if no async messaging
  messaging:
    broker: <broker>              # sqs | sns | eventbridge | kafka | kinesis | none
    pattern: <pattern>            # event-driven | command-driven | pub-sub | streaming | none

# ── Architecture (required) ───────────────────────────────────
architecture:
  style: <style>                  # monolith | modular-monolith | microservices | event-driven | serverless | agentic

  # Remove if no specific patterns
  patterns:
    - <pattern>                   # ddd | cqrs | saga | outbox | api-gateway | bff | strangler-fig

  api_style: rest                 # rest | graphql | grpc | event | mixed

# ── Cloud Platform (required) ─────────────────────────────────
cloud:
  provider: <provider>            # aws | azure | gcp | hybrid
  infra_as_code: cdk              # cdk | terraform | both | none
  regions:
    - eu-west-1                   # target deployment region(s)
  multi_account: true             # separate AWS accounts per environment?

# ── AI Capabilities (remove if not applicable) ────────────────
ai:
  enabled: true
  pattern: <pattern>              # rag | single-agent | multi-agent | enterprise-agent-platform | none
  framework: <framework>          # langgraph | crewai | autogen | mcp | bedrock-agents | none
  foundation_model: claude        # claude | gpt-4 | llama | titan | mixed
  governance_required: false      # auto-set true for regulated domains or multi-agent+
  memory_pattern: <memory>        # in-session | persistent-db | vector-store | none

# ── Governance (required) ─────────────────────────────────────
governance:
  profile: <profile>              # basic | standard | regulated | enterprise
                                  # NOTE: insurance/banking/healthcare requires regulated or enterprise

  # Reviews auto-populated from profile — override if needed
  reviews_required:
    - architecture-review
    - security-review

  # Remove if no compliance obligations
  compliance_frameworks:
    - <framework>                 # gdpr | pci-dss | hipaa | iso27001 | soc2 | eu-ai-act | none

# ── Delivery Model (required) ─────────────────────────────────
delivery:
  model: <model>                  # single-team | multi-team | enterprise-program
  methodology: agile              # agile | kanban | scaled-agile
  sprint_length_weeks: 2          # 1 | 2 | 3 | 4
  cicd_platform: github-actions   # github-actions | jenkins | gitlab-ci | azure-devops | none

# ── Legacy Modernization (remove if greenfield) ───────────────
modernization:
  enabled: false
  source_platform: <platform>     # ibmi | rpg | cobol | mainframe | oracle-forms | vb6 | mixed | none
  strategy: strangler-fig         # strangler-fig | rewrite | lift-and-shift | encapsulate | hybrid
  wave_approach: true             # phased migration waves?

# ── Observability (defaults shown — adjust as needed) ─────────
observability:
  enabled: true
  logging: cloudwatch             # cloudwatch | elk | splunk | datadog | none
  tracing: x-ray                  # x-ray | jaeger | zipkin | datadog | none
  metrics: cloudwatch             # cloudwatch | prometheus | datadog | none
  slo_required: false             # true for regulated/enterprise governance
